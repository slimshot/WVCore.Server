name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: win-x64

    steps:
      - name: Checkout WVCore.Server
        uses: actions/checkout@v4
        with:
          path: WVCore.Server

      - name: Checkout WVCore
        uses: actions/checkout@v4
        with:
          repository: nilaoda/WVCore
          path: WVCore

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Publish
        working-directory: WVCore.Server
        run: dotnet publish -r win-x64 -c Release -o out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WVCore.Server-win-x64
          path: WVCore.Server/out/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:18.04
    name: linux-x64

    steps:
      - name: Install base dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            curl ca-certificates git wget gnupg \
            zlib1g-dev libicu60 libssl1.1 binutils

      - name: Install clang 12 from LLVM APT
        run: |
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
          echo "deb http://apt.llvm.org/bionic/ llvm-toolchain-bionic-12 main" \
            >> /etc/apt/sources.list
          apt-get update -qq
          apt-get install -y clang-12
          update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-12   100
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-12 100

      - name: Checkout WVCore.Server
        uses: actions/checkout@v4
        with:
          path: WVCore.Server

      - name: Checkout WVCore
        uses: actions/checkout@v4
        with:
          repository: nilaoda/WVCore
          path: WVCore

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Publish
        working-directory: WVCore.Server
        run: dotnet publish -r linux-x64 -c Release -o out

      - name: Verify glibc dependency
        working-directory: WVCore.Server/out
        run: |
          echo "=== glibc versions required by binary ==="
          objdump -p WVCore.Server | grep GLIBC || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WVCore.Server-linux-x64
          path: WVCore.Server/out/
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r ../WVCore.Server-win-x64.zip   WVCore.Server-win-x64/
          zip -r ../WVCore.Server-linux-x64.zip WVCore.Server-linux-x64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WVCore.Server-win-x64.zip
            WVCore.Server-linux-x64.zip
          generate_release_notes: true
